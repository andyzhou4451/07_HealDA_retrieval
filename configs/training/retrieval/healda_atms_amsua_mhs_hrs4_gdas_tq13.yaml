epochs: 50
seed: 1024
resume_ckpt: false
pretrain_ckpt: null
resume_pretrain: false

lr: 1e-4
betas: [0.9, 0.95]
weight_decay: 0.05
max_grad_norm: 1.0
gradient_accumulation_steps: 2

warmup_epochs: 5
scheduler_type: cosine_warmup
find_unused_parameters: false
broadcast_buffers: false
gradient_as_bucket_view: true
# Retrieval batch keeps large variable-length observations on CPU and moves them sensor-by-sensor in forward.
# Therefore DDP must not recursively move the whole nested batch before model.forward().
ddp_auto_move_inputs: false
static_graph: false
bucket_cap_mb: 64

use_amp: true
precision:
  type: bf16
device: cuda
cudnn_benchmark: true
deterministic: false
float32_matmul_precision: high
fused_adamw: false
use_gradient_checkpointing: true
compile:
  enabled: false
  target: backbone
  mode: max-autotune-no-cudagraphs

log_dir: ${paths.output_dir}
profile: false
log_every_n_steps: 20

# Debug overrides can be supplied from CLI:
# debug=true model.net.model_size=tiny datamodule.batch_size=1 datamodule.num_workers=0
limit_train_batches: null
limit_val_batches: null

# H100 single-GPU/tuning compatible fields. Existing 2-GPU Slurm can still override these.
single_gpu: false
effective_batch_size: 1
warmup_steps: 1000
max_steps: 100000
grad_clip_norm: 1.0
channels_last: false
performance_log_dir: outputs/logs
performance_log_every_n_steps: 1
validate_every_n_epochs: 1
save_every_n_epochs: 1
