# configs/training/default.yaml

# 训练参数
epochs: 20
seed: 1024
pretrain_ckpt: null
resume_ckpt: true
resume_pretrain: false
lr: 1e-6
betas: [0.9, 0.95]
weight_decay: 5e-5
max_grad_norm: 1.0

# 学习率调度器
warmup_epochs: 5  # Warmup轮数
scheduler_type: cosine_warmup  # cosine_warmup | cosine | none

# DDP设置
find_unused_parameters: true

# 日志
log_dir: ${paths.output_dir}
profile: false  # 启用torch_tb_profiler

# 数值精度
use_amp: true
precision:
  type: "bf16"

# 加速卡类型: "cuda" 或 "gpu"
device: "cuda"