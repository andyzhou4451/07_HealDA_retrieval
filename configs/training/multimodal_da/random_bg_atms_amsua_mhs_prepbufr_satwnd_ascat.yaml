# configs/training/default.yaml

# 训练参数
epochs: 100
seed: 1024
resume_ckpt: true
lr: 1e-3
lr_roe: 1e-3
lr_fusion: 1e-3
betas: [0.9, 0.95]
weight_decay: 5e-5
max_grad_norm: 1.0
is_extension: false
new_obs_names: []

# DA_model参数
model_training_config:
  forecast_model:
    trainable: false
    pretrained_path: logs/finetune_xichen_state_forecast_ar15_20260616/runs/checkpoints/best.ckpt
    strict: false
  da_model:
    trainable: true
    pretrained_path: null
  roe_models:
    atms:
      trainable: true
      pretrained_path: null
    amsua:
      trainable: true
      pretrained_path: null
    mhs:
      trainable: true
      pretrained_path: null
    prepbufr:
      trainable: true
      pretrained_path: null
    satwnd:
      trainable: true
      pretrained_path: null
    ascat:
      trainable: true
      pretrained_path: null
  obsop_models:
    atms:
      trainable: false
      pretrained_path: logs/train_atms_obsop_20260608/runs/checkpoints/best.ckpt
      strict: false
    amsua:
      trainable: false
      pretrained_path: logs/train_amsua_obsop_20260610/runs/checkpoints/best.ckpt
      strict: false
    mhs:
      trainable: false
      pretrained_path: logs/train_mhs_obsop_20260610/runs/checkpoints/best.ckpt
      strict: false

obs_list:
  atms: 
    trainable: true
  amsua: 
    trainable: true
  mhs: 
    trainable: true
  prepbufr: 
    trainable: true
  satwnd: 
    trainable: true
  ascat: 
    trainable: true

# 学习率调度器
warmup_epochs: 10  # Warmup轮数
scheduler_type: cosine_warmup  # cosine_warmup | cosine | none

# DDP设置
find_unused_parameters: true

# 日志
log_dir: ${paths.output_dir}
profile: false  # 启用torch_tb_profiler

# 数值精度
use_amp: true
precision:
  type: "bf16"

# 加速卡类型: "cuda" 或 "gpu"
device: "cuda"